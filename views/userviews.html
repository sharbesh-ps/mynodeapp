<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>View User</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/home"> Dashboard </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="/home"> Home </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/views"> Users </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/create"> Create User </a>
            </li>
            <li class="nav-item">
              <a class="btn btn-danger" href="/logout"> Logout </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card border-0 shadow-lg bg-dark text-light rounded-4">
            <div class="card-header bg-black border-bottom border-secondary py-4" >
              <h2 class="text-center text-warning fw-bold mb-0">
                User Profile
              </h2>
            </div>
            <div class="card-body p-4">
              <table class="table table-dark table-hover align-middle mb-0">
                <tbody>
                  <tr>
                    <th width="35%" class="text-warning">Username</th>
                    <td>
                      <span class="badge bg-primary fs-6 px-3 py-2" id="username" ></span>
                    </td>
                  </tr>
                  <tr>
                    <th class="text-warning">Email</th>
                    <td id="email"></td>
                  </tr>
                  <tr>
                    <th class="text-warning">Mobile</th>
                    <td id="mobile"></td>
                  </tr>
                  <tr>
                    <th class="text-warning">Date of Birth</th>
                    <td id="dob"></td>
                  </tr>
                  <tr>
                    <th class="text-warning">Gender</th>
                    <td>
                      <span
                        class="badge bg-info text-dark fs-6"
                        id="gender"
                      ></span>
                    </td>
                  </tr>
                  <tr>
                    <th class="text-warning">Language</th>
                    <td>
                      <span class="badge bg-success fs-6" id="language"></span>
                    </td>
                  </tr>
                  <tr>
                    <th class="text-warning">Skills</th>
                    <td>
                      <span class="badge bg-secondary fs-6" id="skills"></span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="card-footer bg-black border-top border-secondary py-3">
              <div class="d-flex justify-content-between">
                <button class="btn btn-outline-light px-4" onclick="goBack()">
                  ← Back
                </button>
                <button id="editBtn" class="btn btn-warning px-4 fw-bold">
                  Edit User
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/viewUser.js"></script>
  </body>
</html>
