<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #111827;
        color: #fff;
      }

      .card {
        background: #1f2937;
        color: #fff;
        border: none;
        border-radius: 15px;
      }

      .navbar {
        background: #000;
      }

      .feature-card {
        transition: 0.3s;
        cursor: pointer;
      }

      .feature-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
      }

      .icon {
        font-size: 60px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-dark">
      <div class="container">
        <span class="navbar-brand fw-bold"> Student Dashboard </span>

        <a href="/logout" class="btn btn-danger"> Logout </a>
      </div>
    </nav>

    <div class="container py-5">
      <div class="text-center mb-5">
        <h2 id="studentName">Welcome Student</h2>

        <p class="text-secondary">Student Portal</p>
      </div>

      <div class="row justify-content-center g-4">
        <div class="col-md-4">
          <div class="card feature-card p-4 text-center">
            <div class="icon">👤</div>

            <h4 class="mt-3">My Profile</h4>

            <p class="text-secondary">View your personal information</p>

            <a href="/student/profile" class="btn btn-primary mt-2">
              View Profile
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/studentHome.js"></script>
  </body>
</html>
