<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Update User</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="bg-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/home"> Dashboard </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="/home"> Home </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/views"> Users </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/create"> Create User </a>
          </li>
          <li class="nav-item">
            <a class="btn btn-danger" href="/logout"> Logout </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <button class="btn btn-secondary mb-4" onclick="goBack()">Back</button>
        <div class="card shadow">
          <div class="card-header bg-warning">
            <h3 class="text-center mb-0">Update User</h3>
          </div>

          <div class="card-body">
            <form id="updateForm">
              <!-- Username -->

              <div class="mb-3">
                <label class="form-label"> Username </label>

                <input type="text" id="username" name="username" class="form-control" />
              </div>

              <!-- Email -->

              <div class="mb-3">
                <label class="form-label"> Email </label>
                <input type="email" id="email" name="email" class="form-control" />
                <small id="emailError" class="text-danger"> </small>
              </div>


              <!-- new password -->
              <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" id="password" name="password" class="form-control"
                  placeholder="Leave blank to keep current password">
                <small id="passwordError" class="text-danger"></small>
              </div>

              <!-- Mobile -->
              <div class="mb-3">
                <label class="form-label"> Mobile </label>
                <input type="text" id="mobile" name="mobile" maxlength="10" class="form-control" />
                <small id="mobileError" class="text-danger"> </small>
              </div>
              
              
              <!-- Role -->
              <div class="mb-3">
                <label class="form-label">Role</label>
                <select id="role" name="role" class="form-select" required>
                  <option value="">Select Role</option>
                  <option value="ADMIN">Admin</option>
                  <option value="STUDENT">Student</option>
                </select>
                <small id="roleError" class="text-danger"></small>
              </div>

              <!-- DOB -->
              <div class="mb-3">
                <label class="form-label"> Date of Birth </label>
                <input type="date" id="dob" name="dob" class="form-control" />
              </div>

              <!-- Gender -->
              <div class="mb-3">
                <label class="form-label d-block"> Gender </label>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" value="Male" />
                  <label class="form-check-label"> Male </label>
                </div>

                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" value="Female" />
                  <label class="form-check-label"> Female </label>
                </div>

                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" value="Other" />
                  <label class="form-check-label"> Other </label>
                </div>
              </div>

              <!-- Language -->

              <div class="mb-3">
                <label class="form-label"> Language </label>
                <select id="language" name="language" class="form-select" multiple>
                  <option value="">Select Language</option>
                  <option value="English">English</option>
                  <option value="Tamil">Tamil</option>
                  <option value="Kannada">Kannada</option>
                  <option value="Hindi">Hindi</option>
                </select>
              </div>

              <!-- Skills -->

              <div class="mb-4">
                <label class="form-label d-block"> Skills </label>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="skills" value="React" />

                  <label class="form-check-label"> React </label>
                </div>

                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="skills" value="Node.js" />

                  <label class="form-check-label"> Node.js </label>
                </div>

                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="skills" value="Express" />

                  <label class="form-check-label"> Express </label>
                </div>

                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="skills" value="MongoDB" />

                  <label class="form-check-label"> MongoDB </label>
                </div>
              </div>

              <!-- Buttons -->

              <div class="d-flex justify-content-between">
                <button type="button" class="btn btn-secondary" onclick="goBack()">
                  Cancel
                </button>

                <button type="submit" class="btn btn-warning">
                  Update User
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/update.js"></script>
</body>

</html>
