<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Create User</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/home"> Dashboard </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="/home"> Home </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/views"> Users </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/create"> Create User </a>
            </li>
            <li class="nav-item">
              <a class="btn btn-danger" href="/logout"> Logout </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <button class="btn btn-secondary mb-4" onclick="goBack()">Back</button>
          <div class="card shadow">
            <div class="card-header bg-primary text-white">
              <h3 class="mb-0 text-center">Create User</h3>
            </div>
            <div class="card-body">
              <form id="createForm" action="/register" method="POST">

                <!-- Username -->
                <div class="mb-3">
                  <label class="form-label"> Username </label>
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    required
                  />
                  <div id="usernameError" class="text-danger small"></div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                  <label class="form-label"> Email </label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="Enter email"
                    required
                  />
                  <div id="emailError" class="text-danger small"></div>
                </div>

                <!-- Mobile -->
                <div class="mb-3">
                  <label class="form-label"> Mobile </label>
                  <input
                    type="text"
                    maxlength="10"
                    class="form-control"
                    id="mobile"
                    name="mobile"
                    placeholder="Enter mobile number"
                    required
                  />
                  <div id="mobileError" class="text-danger small"></div>
                </div>

                <!-- DOB -->
                <div class="mb-3">
                  <label class="form-label"> Date of Birth </label>
                  <input type="date" id="dob" name="dob" class="form-control" />
                </div>

                <!-- Gender -->
                <div class="mb-3">
                  <label class="form-label d-block"> Gender </label>
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="gender"
                      id="male"
                      value="Male"
                    />
                    <label class="form-check-label" for="male"> Male </label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="gender"
                      id="female"
                      value="Female"
                    />
                    <label class="form-check-label" for="female">
                      Female
                    </label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="gender"
                      id="other"
                      value="Other"
                    />
                    <label class="form-check-label" for="other"> Other </label>
                  </div>
                </div>

                <!-- Language -->
                <div class="mb-3">
                  <label class="form-label"> Language </label>
                  <select id="language" name="language" class="form-select">
                    <option value="">Select Language</option>
                    <option value="English">English</option>
                    <option value="Tamil">Tamil</option>
                    <option value="Kannada">Kannada</option>
                    <option value="Hindi">Hindi</option>
                  </select>
                </div>

                <!-- Skills -->
                <div class="mb-4">
                  <label class="form-label d-block"> Skills </label>
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      name="skills"
                      value="React"
                      id="react"
                    />
                    <label class="form-check-label" for="react"> React </label>
                  </div>
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      name="skills"
                      value="Node.js"
                      id="node"
                    />
                    <label class="form-check-label" for="node"> Node.js </label>
                  </div>
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      name="skills"
                      value="Express"
                      id="express"
                    />
                    <label class="form-check-label" for="express">
                      Express
                    </label>
                  </div>
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      name="skills"
                      value="MongoDB"
                      id="mongodb"
                    />
                    <label class="form-check-label" for="mongodb">
                      MongoDB
                    </label>
                  </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between">
                  <button type="submit" class="btn btn-success">
                    Register
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/create.js"></script>
  </body>
</html>
