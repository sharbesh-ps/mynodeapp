<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Users</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.bootstrap5.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/home"> Dashboard </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="/home"> Home </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/views"> Users </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/create"> Create User </a>
          </li>
          <li class="nav-item">
            <a class="btn btn-danger" href="/logout"> Logout </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-5">
    <!-- Heading -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>User Management</h2>
      <button class="btn btn-secondary" onclick="goBack()">Back</button>
    </div>
    <!-- Filters -->
    <div class="card shadow mb-4">
      <div class="card-body">
        <div class="row g-3">
          <!-- Search -->
          <div class="col-md-3">
            <input type="text" id="search" class="form-control" placeholder="Search Username & Email" />
          </div>

          <!-- Role -->
          <div class="col-md-2">
            <select id="roleFilter" class="form-select">
              <option value="">All Roles</option>
              <option value="ADMIN">Admin</option>
              <option value="STUDENT">Student</option>
            </select>
          </div>

          <!-- Gender -->
          <div class="col-md-2">
            <select id="genderFilter" class="form-select">
              <option value="">All Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <!-- Language -->
          <div class="col-md-2">
          <select id="languageFilter" class="form-select" multiple>
            <option value="English">English</option>
            <option value="Tamil">Tamil</option>
            <option value="Kannada">Kannada</option>
            <option value="Hindi">Hindi</option>
          </select>
          </div>

          <!-- Skills -->
          <div class="col-md-2">
          <select id="skillsFilter" class="form-select" multiple>
            <option value="React">React</option>
            <option value="Node.js">Node.js</option>
            <option value="Express">Express</option>
            <option value="Mongodb">Mongodb</option>
          </select>
          </div>


          <div class="col-md-1">
            <button type="button" class="btn btn-warning" id="resetBtn">Reset</button>
          </div>

          <div class="col-md-2">
            <a href="/create" class="btn btn-success"> Create User </a>
          </div>

        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="card shadow">
      <div class="table-responsive">
        <table class="table table-hover table-bordered align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th>Sno</th>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Mobile</th>
              <th>DOB</th>
              <th>Gender</th>
              <th>Language</th>
              <th>Skills</th>
              <th width="220">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/users.js"></script>
</body>

</html>
